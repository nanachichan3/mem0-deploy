# Mem0 self-host stack: API + dashboard + PostgreSQL (pgvector) + Neo4j (graph).
# Guide: https://mem0.ai/blog/self-host-mem0-docker
# Base compose: https://gist.github.com/BexTuychiev/2597529900335a66265dff5955f1cebf

name: mem0-selfhost

services:
  mem0:
    build: .
    image: mem0-selfhost:latest
    restart: unless-stopped
    ports:
      - "${MEM0_API_PORT:-8888}:8000"
    networks:
      - mem0_network
    volumes:
      - ./history:/app/history
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/auth/setup-status')",
        ]
      interval: 5s
      timeout: 10s
      retries: 36
      start_period: 120s
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      # Required at process start (embedder client); replace with a real key for LLM/embeddings.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-mem0-local-placeholder-replace-me}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_COLLECTION_NAME: ${POSTGRES_COLLECTION_NAME:-memories}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-mem0graph}
      APP_DB_NAME: ${APP_DB_NAME:-mem0_app}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-generate-a-long-random-secret}
      AUTH_DISABLED: ${AUTH_DISABLED:-false}
      # Browser origin for CORS — must match where you open the dashboard (see mem0-dashboard service port).
      DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:3030}
      MEM0_DEFAULT_LLM_MODEL: ${MEM0_DEFAULT_LLM_MODEL:-gpt-4.1-nano-2025-04-14}
      MEM0_DEFAULT_EMBEDDER_MODEL: ${MEM0_DEFAULT_EMBEDDER_MODEL:-text-embedding-3-small}
      MEM0_TELEMETRY: ${MEM0_TELEMETRY:-true}

  postgres:
    image: ankane/pgvector:v0.5.1
    restart: unless-stopped
    shm_size: "128mb"
    networks:
      - mem0_network
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      APP_DB_NAME: ${APP_DB_NAME:-mem0_app}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -q -d \"$$POSTGRES_DB\" -U \"$$POSTGRES_USER\" || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_db:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "${POSTGRES_PUBLISH_PORT:-8432}:5432"

  neo4j:
    image: neo4j:5.26.4
    restart: unless-stopped
    networks:
      - mem0_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p \"${NEO4J_PASSWORD:-mem0graph}\" -a bolt://localhost:7687 'RETURN 1' || exit 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 90s
    ports:
      - "${NEO4J_HTTP_PORT:-8474}:7474"
      - "${NEO4J_BOLT_PORT:-8687}:7687"
    volumes:
      - neo4j_data:/data
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-mem0graph}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"

  mem0-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.mem0-dashboard
    restart: unless-stopped
    ports:
      - "${MEM0_DASHBOARD_PORT:-3030}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${MEM0_DASHBOARD_PUBLIC_API_URL:-http://localhost:8888}
      - API_INTERNAL_URL=http://mem0:8000
      - NEXT_PUBLIC_INSTANCE_NAME=${MEM0_DASHBOARD_INSTANCE:-Mem0 Local}
    depends_on:
      mem0:
        condition: service_healthy
    networks:
      - mem0_network

volumes:
  neo4j_data:
  postgres_db:

networks:
  mem0_network:
    driver: bridge
